name: Pipeline Observability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov ruff mypy bandit
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src/registry --cov-report=xml --cov-report=term-missing --cov-fail-under=10
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./reports/coverage.xml
          fail_ci_if_error: false
      
      - name: Run linting
        run: |
          ruff check src/
          mypy src/ --config-file=pyproject.toml
      
      - name: Run security scan
        run: |
          bandit -r src/ -f txt -o security-report.txt --exit-zero
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            reports/
            security-report.txt
          retention-days: 30
