# Continuous Training Configuration
training:
  schedule: "0 2 * * 0"
  trigger_on_new_data: true
  min_new_samples: 100
  
model:
  registry_name: "multi-model-registry"
  stage_transition: "Staging"
  performance_threshold: 0.85
  
resources:
  cpu_limit: "2"
  memory_limit: "2G"
  gpu_enabled: false
  
logging:
  mlflow_tracking_uri: "http://localhost:5000"
  log_level: "INFO"
