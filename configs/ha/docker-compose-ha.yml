version: '3.8'
services:
  api-1:
    build: .
    ports:
      - "8001:8000"
    environment:
      - MODEL_VERSION=1.0.2
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-2:
    build: .
    ports:
      - "8002:8000"
    environment:
      - MODEL_VERSION=1.0.2
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx-lb:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-ha.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
