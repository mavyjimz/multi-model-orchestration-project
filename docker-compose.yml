version: '3.8'

services:
  # nginx reverse proxy
  nginx:
    build:
      context: ./configs/nginx
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - mlops-network
    restart: unless-stopped

  # FastAPI application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - PORT=8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key}
      - AUDIT_TAMPER_HASH_SECRET=${AUDIT_TAMPER_HASH_SECRET:-dev-hash-secret}
    volumes:
      - ./mlruns:/app/mlruns
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    networks:
      - mlops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mlops-network:
    driver: bridge

volumes:
  mlruns:
  artifacts:
  logs:
